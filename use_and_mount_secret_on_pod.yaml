apiVersion: v1
kind: Pod
metadata:
  name: secret-xfusion
spec:
  containers:
    - name: secret-container-xfusion
      image: ubuntu:latest
      command: ["sleep"]
      args: ["infinity"]
      volumeMounts:
        - name: volume-secret
          mountPath: /opt/games
          readOnly: true
  volumes:
    - name: volume-secret
      secret:
        secretName: ecommerce
