apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-datacenter
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data"
    
    
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-datacenter
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 3Gi
      
      
      
apiVersion: v1
kind: Pod
metadata:
  name: pod-datacenter
  labels:
    app: pod-nginx
spec:
  volumes:
    - name: pod-volume
      persistentVolumeClaim:
        claimName: pvc-datacenter
  containers:
    - name: container-datacenter
      image: nginx:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - name: pod-volume
          mountPath: /usr/share/nginx/html
      

apiVersion: v1
kind: Service
metadata:
  name: web-datacenter
spec:
  type: NodePort
  selector:
    app: pod-nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30008
